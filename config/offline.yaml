data_dir: ./INSTA # Please set your own dataset path
output_dir: ./output/
template_type: Flame

dataset:
  pin_memory: True
  use_shape_weight: True
  use_pose_weight: True

model:
  tex_size: 256
  num_basis_in: 129
  num_basis_blend: 20
  use_blend: True
  use_weight_proj: True
  use_mlp_proj: True

  init_scaling: 0.0005
  init_opacity: 0.3

train:
  batch_size: 4
  iteration: 50_000

  recon:
    blend_start_iter: 3000
    use_fast_forward: True
    random_bg_color: True
    bg_color: [0.0, 0.0, 0.0]

    scene_extent: 1.0
    position_lr: 0.0004
    position_lr_final: 0.000008
    position_lr_delay_mult: 0.01
    position_lr_max_steps: 45_000
    opacity_lr: 0.25
    scaling_lr: 0.025
    rotation_lr: 0.005
    feature_lr: 0.0125

    position_b_lr_scale: 0.05
    rotaion_b_lr_scale: 0.5
    feature_b_lr_scale: 0.5

    weight_module_lr: 0.001

    lambda_charbonnier: 0.9
    lambda_ssim: 0.1
    lambda_lpips: 0.05
    lambda_alpha: 0.10
    lambda_sparsity: 0.005
    lambda_orth: 0.0
    lambda_normal: 0.1
    lambda_scale_l2: 0.15
    lambda_surface: 0.5
